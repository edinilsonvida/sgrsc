<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 490" role="img" aria-label="Instituto Federal de Santa Catarina">

  <!-- Row 1: red circle (col 1), green square (col 2), green square (col 3) -->
  <circle cx="52" cy="46" r="40" fill="#C8102E"/>
  <rect x="102" y="6"   width="76" height="76" rx="10" fill="#1C7C3B"/>
  <rect x="192" y="6"   width="76" height="76" rx="10" fill="#1C7C3B"/>

  <!-- Row 2: green sq (col 1), green sq (col 2), [empty col 3] -->
  <rect x="6"   y="96"  width="76" height="76" rx="10" fill="#1C7C3B"/>
  <rect x="102" y="96"  width="76" height="76" rx="10" fill="#1C7C3B"/>

  <!-- Row 3: all 3 green squares -->
  <rect x="6"   y="186" width="76" height="76" rx="10" fill="#1C7C3B"/>
  <rect x="102" y="186" width="76" height="76" rx="10" fill="#1C7C3B"/>
  <rect x="192" y="186" width="76" height="76" rx="10" fill="#1C7C3B"/>

  <!-- Row 4: green sq (col 1), green sq (col 2), [empty col 3] -->
  <rect x="6"   y="276" width="76" height="76" rx="10" fill="#1C7C3B"/>
  <rect x="102" y="276" width="76" height="76" rx="10" fill="#1C7C3B"/>

  <!-- Text -->
  <text x="135" y="392" font-family="'Arial Black','Franklin Gothic Heavy','Gill Sans Ultra Bold',Impact,sans-serif" font-size="66" font-weight="900" fill="#1A1A1A" text-anchor="middle" letter-spacing="-1">INSTITUTO</text>
  <text x="135" y="452" font-family="'Arial Black','Franklin Gothic Heavy','Gill Sans Ultra Bold',Impact,sans-serif" font-size="66" font-weight="900" fill="#1A1A1A" text-anchor="middle" letter-spacing="-1">FEDERAL</text>
  <text x="135" y="485" font-family="Arial,Helvetica,sans-serif" font-size="38" font-weight="400" fill="#1A1A1A" text-anchor="middle">Santa Catarina</text>
</svg>
